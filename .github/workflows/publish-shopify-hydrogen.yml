name: Publish @echosdk/shopify-hydrogen

on:
  push:
    tags:
      - 'shopify-hydrogen@*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @echosdk/react (peer dep)
        run: pnpm --filter @echosdk/react run build

      - name: Run tests
        run: pnpm --filter @echosdk/shopify-hydrogen run test

      - name: Build
        run: pnpm --filter @echosdk/shopify-hydrogen run build

      - name: Check npm authentication
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ECHOSDK_GITHUB_ACTIONS }}

      - name: Publish to npm
        run: pnpm --filter @echosdk/shopify-hydrogen publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ECHOSDK_GITHUB_ACTIONS }}
