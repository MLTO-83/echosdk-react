name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests (@echosdk/react)
        run: pnpm --filter @echosdk/react run test:coverage

      - name: Run tests (@echosdk/shopify-hydrogen)
        run: pnpm --filter @echosdk/shopify-hydrogen run test:coverage

      - name: Build all packages
        run: pnpm run build

      - name: Upload @echosdk/react coverage
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '20.x'
        with:
          files: ./packages/react/coverage/coverage-final.json
          flags: react

      - name: Upload @echosdk/shopify-hydrogen coverage
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '20.x'
        with:
          files: ./packages/shopify-hydrogen/coverage/coverage-final.json
          flags: shopify-hydrogen
